<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>layerlane-apply</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 380px;
        margin: 0;
        padding: 12px;
        font:
          13px/1.4 system-ui,
          sans-serif;
        color: #111;
        background: #fafafa;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }
      label {
        display: block;
        font-size: 11px;
        color: #555;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        padding: 6px 8px;
        margin-bottom: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font: inherit;
      }
      button {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        border: none;
        border-radius: 4px;
        background: #111;
        color: #fff;
        font: inherit;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .row {
        margin-bottom: 8px;
      }
      .out {
        margin-top: 12px;
        padding: 8px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 12px;
        max-height: 280px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .copy {
        display: inline-block;
        margin-top: 6px;
        padding: 4px 8px;
        font-size: 11px;
        background: #eee;
        color: #111;
        border-radius: 3px;
        cursor: pointer;
        width: auto;
      }
      .err {
        color: #b00020;
        font-size: 12px;
        margin-top: 8px;
      }
      .muted {
        font-size: 11px;
        color: #666;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <h1>layerlane-apply</h1>
    <p class="muted">Set your app URL and API token from Settings in the web app.</p>
    <div class="row">
      <label for="baseUrl">App base URL</label>
      <input id="baseUrl" type="url" placeholder="http://localhost:3000" autocomplete="off" />
    </div>
    <div class="row">
      <label for="token">API token</label>
      <input id="token" type="password" placeholder="Bearer token" autocomplete="off" />
    </div>
    <button id="save" type="button">Save settings</button>
    <button id="run" type="button">Capture page &amp; analyze</button>
    <div id="error" class="err" hidden></div>
    <div id="out" class="out" hidden></div>
    <script src="popup.js"></script>
  </body>
</html>
